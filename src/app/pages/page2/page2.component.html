<div class="page2-home d-flex flex-column align-items-center justify-content-center text-white text-center">
  <div class="content container p-4">
    <h1 class="display-4 fw-bold notube-brand">Converting..</h1>

    <!-- Always show loader -->
    <div class="spinner my-4"></div>

    <!-- Dynamic stage message -->
    <p class="fs-5 mt-2">{{ stageText }}</p>

    <div *ngIf="completed" class="mt-4">
      <p class="fs-4">Redirecting to download page...</p>
    </div>
  </div>
</div>
